spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/tabletophelper
    username: tabletophelper
    password: tabletophelper
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    baseline-on-migrate: true
    baseline-version: 0

logging:
  level:
    com.tabletophelper: DEBUG
    org.hibernate.SQL: DEBUG
