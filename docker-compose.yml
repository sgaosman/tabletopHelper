services:
  db:
    image: postgres:16
    container_name: tabletophelper-db
    environment:
      POSTGRES_DB: tabletophelper
      POSTGRES_USER: tabletophelper
      POSTGRES_PASSWORD: tabletophelper
    ports:
      - "5432:5432"
    volumes:
      - tabletophelper-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  tabletophelper-data:
